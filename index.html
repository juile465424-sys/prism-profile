<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 프로필 사이트</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      text-align: center;
      padding: 30px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #1b1b1b;
    }

    h1 {
      margin-top: 0;
      color: #ff4b4b;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>사이트 연결 성공</h1>
    <p>여기에 앞으로 프로필 제작 사이트를 만들면 됩니다.</p>
  </div>
</body>
</html>
